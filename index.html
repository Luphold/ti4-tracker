<!DOCTYPE html>
<!-- TI4 Tracker 2.035 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<title>TI4 Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg:#0a0e1a; --panel:#1a2440; --panel2:#243254;
  --border:#3a4570; --border2:#4a5985;
  --gold:#c9a84c; --text:#dde4f0; --text-dim:#8a9bbf;
  --green:#27ae60; --red:#e74c3c; --blue:#2980b9;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; color: var(--text); font-family: system-ui, sans-serif; font-size: 15px; }
body {
  background:
    radial-gradient(ellipse at 20% 30%, rgba(80, 60, 180, 0.15), transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(100, 50, 130, 0.12), transparent 50%),
    radial-gradient(circle at 15% 80%, rgba(255,255,255,0.8) 0.5px, transparent 1.5px),
    radial-gradient(circle at 75% 15%, rgba(255,255,255,0.9) 0.7px, transparent 1.8px),
    radial-gradient(circle at 45% 60%, rgba(255,255,255,0.7) 0.4px, transparent 1.2px),
    radial-gradient(circle at 88% 45%, rgba(180,220,255,0.9) 0.6px, transparent 1.5px),
    radial-gradient(circle at 25% 50%, rgba(255,240,200,0.8) 0.5px, transparent 1.4px),
    radial-gradient(circle at 60% 25%, rgba(255,255,255,0.7) 0.4px, transparent 1.2px),
    radial-gradient(circle at 92% 80%, rgba(220,200,255,0.8) 0.5px, transparent 1.4px),
    radial-gradient(circle at 8% 18%, rgba(255,255,255,0.6) 0.3px, transparent 1.1px),
    radial-gradient(circle at 38% 88%, rgba(200,220,255,0.7) 0.4px, transparent 1.3px),
    radial-gradient(circle at 65% 92%, rgba(255,255,255,0.8) 0.5px, transparent 1.4px),
    radial-gradient(circle at 50% 10%, rgba(255,230,220,0.7) 0.4px, transparent 1.2px),
    radial-gradient(circle at 12% 65%, rgba(255,255,255,0.6) 0.4px, transparent 1.2px),
    linear-gradient(180deg, #0a0e1a 0%, #0e1428 50%, #0a0e1a 100%);
  background-size: auto, auto, 200px 200px, 250px 250px, 300px 300px, 220px 220px, 280px 280px, 260px 260px, 240px 240px, 270px 270px, 290px 290px, 230px 230px, 310px 310px, 250px 250px, auto;
  background-attachment: fixed;
}
.screen { display: none; min-height: 100vh; padding: 20px; }
.screen.active { display: block; }
.logo { font-size: 28px; color: var(--gold); text-align: center; letter-spacing: .1em; margin: 40px 0 8px; font-weight: 700; }
.subtitle { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 32px; }
.panel { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.panel-title { font-size: 11px; letter-spacing: .15em; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.btn { display: inline-block; padding: 12px 18px; border-radius: 6px; border: 1px solid var(--border2); background: rgba(36, 50, 84, 0.5); color: var(--text); font-size: 14px; cursor: pointer; text-align: center; backdrop-filter: blur(2px); }
.btn-primary { background: rgba(201,168,76,.15); border-color: var(--gold); color: var(--gold); }
.btn-danger { background: rgba(231,76,60,.1); border-color: var(--red); color: var(--red); }
.btn-full { width: 100%; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
input, select { background: rgba(36, 50, 84, 0.5); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 10px 12px; font-size: 14px; width: 100%; -webkit-appearance: none; }
input:focus, select:focus { outline: none; border-color: var(--gold); }
label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; margin-top: 8px; }
.row { display: flex; gap: 8px; align-items: center; }
.row > * { flex: 1; }
.dim { color: var(--text-dim); }
.gold { color: var(--gold); }
.small { font-size: 12px; }
.tiny { font-size: 10px; font-family: monospace; }
.center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.version { font-size: 10px; color: var(--text-dim); font-family: monospace; margin-bottom: 8px; }

/* Score */
.player-card { background: rgba(36, 50, 84, 0.5); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; backdrop-filter: blur(2px); }
.player-row { display: flex; align-items: center; gap: 10px; }
.player-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.player-name { flex: 1; font-weight: 600; }
.player-vp { font-size: 24px; font-weight: 700; min-width: 36px; text-align: center; color: var(--gold); }
.vp-btn { width: 36px; height: 36px; border: 1px solid var(--border2); background: var(--panel); color: var(--text); font-size: 20px; border-radius: 6px; cursor: pointer; }
.vp-btn.plus { border-color: var(--green); color: var(--green); }
.vp-btn.minus { border-color: var(--red); color: var(--red); }
.vp-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.vp-bar > div { height: 100%; transition: width .3s; }

/* Nav */
.nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26, 36, 64, 0.85); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 0); backdrop-filter: blur(6px); }
.nav.visible { display: flex; }
.nav-btn { flex: 1; padding: 10px; text-align: center; background: none; border: none; color: var(--text-dim); font-size: 11px; cursor: pointer; }
.nav-btn.active { color: var(--gold); }
.nav-icon { display: block; font-size: 18px; margin-bottom: 2px; }

/* Status bar */
.status-bar { display: none; background: rgba(26, 36, 64, 0.85); border-bottom: 1px solid var(--border); padding: 8px 12px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(6px); }
.status-bar.visible { display: flex; }
.round-display {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: .12em;
  color: #5db8ff;
  text-shadow: 0 0 12px rgba(93, 184, 255, 0.6), 0 0 4px rgba(93, 184, 255, 0.8);
}
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); display: inline-block; margin-right: 6px; }
.conn-dot.on { background: var(--green); }

/* Tech */
.tech-chip { display: inline-block; padding: 4px 8px; margin: 2px; border-radius: 4px; font-size: 11px; border-left: 3px solid; }
.tech-chip.biotic { background: rgba(39,174,96,.13); color: #5ddb8a; border-left-color: var(--green); }
.tech-chip.propulsion { background: rgba(41,128,185,.13); color: #5ba8d9; border-left-color: var(--blue); }
.tech-chip.cybernetic { background: rgba(212,172,13,.13); color: #e8cc30; border-left-color: #d4ac0d; }
.tech-chip.warfare { background: rgba(231,76,60,.13); color: #f07060; border-left-color: var(--red); }
.tech-chip.unit { background: rgba(165,105,189,.13); color: #c9a0dc; border-left-color: #a569bd; }
.tech-chip.faction { background: rgba(201,168,76,.13); color: #c9a855; border-left-color: var(--gold); }
.tech-item { padding: 8px; border-radius: 4px; border-left: 3px solid; cursor: pointer; font-size: 12px; margin: 3px; display: inline-block; }
.tech-item.biotic { background: rgba(39,174,96,.08); color: #5ddb8a; border-left-color: var(--green); }
.tech-item.propulsion { background: rgba(41,128,185,.08); color: #5ba8d9; border-left-color: var(--blue); }
.tech-item.cybernetic { background: rgba(212,172,13,.08); color: #e8cc30; border-left-color: #d4ac0d; }
.tech-item.warfare { background: rgba(231,76,60,.08); color: #f07060; border-left-color: var(--red); }
.tech-item.unit { background: rgba(165,105,189,.08); color: #c9a0dc; border-left-color: #a569bd; }
.tech-item.faction { background: rgba(201,168,76,.08); color: #c9a855; border-left-color: var(--gold); }
.tech-section { margin-bottom: 12px; }
.tech-section-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; padding-bottom: 4px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }

/* Faction modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; }
.modal-overlay.open { display: block; }
.modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26, 36, 64, 0.95); border-radius: 12px 12px 0 0; max-height: 85vh; overflow-y: auto; z-index: 101; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0)); backdrop-filter: blur(8px); }
.modal.open { display: block; }
.modal.modal-center { top: 50%; bottom: auto; left: 50%; right: auto; transform: translate(-50%, -50%); border-radius: 12px; max-width: 320px; width: 90%; max-height: 90vh; padding: 16px; }
.modal-section { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin: 14px 0 6px; padding-bottom: 3px; border-bottom: 1px solid var(--border); }
.modal-text { font-size: 13px; line-height: 1.5; margin-bottom: 6px; padding-left: 8px; border-left: 2px solid var(--border2); }

.body-padded { padding-bottom: 70px; }

#log-toggle { position: fixed; bottom: 70px; right: 10px; background: rgba(0,0,0,.6); color: white; padding: 4px 8px; font-size: 10px; font-family: monospace; border-radius: 4px; z-index: 201; cursor: pointer; border: 1px solid var(--border2); }
#log { position: fixed; bottom: 100px; left: 10px; right: 10px; background: rgba(0,0,0,.9); color: white; padding: 8px; font-size: 11px; font-family: monospace; border-radius: 4px; z-index: 200; max-height: 200px; overflow-y: auto; display: none; }
#log.open { display: block; }
</style>
</head>
<body>

<!-- Welcome screen -->
<div id="screen-welcome" class="screen active">
  <div class="logo">⚔ TI4 TRACKER</div>
  <div class="subtitle">Twilight Imperium IV</div>
  
  <div class="panel">
    <div class="panel-title">Connect to Supabase</div>
    <div class="version" id="version-display">v2.002</div>
    
    <div id="setup-form">
      <label>Supabase Project URL</label>
      <input id="inp-url" type="url" placeholder="https://xxxx.supabase.co">
      <label>Supabase Anon Key</label>
      <input id="inp-key" type="text" placeholder="eyJ...">
      <button id="btn-save" class="btn btn-primary btn-full mt-16">Save & Connect</button>
      <button id="btn-reset" class="btn btn-full mt-8">↺ Clear Cache & Reload</button>
      <div class="small dim mt-8">Get these from Supabase → Settings → API Keys.<br>Use just the base URL (no /rest/v1/).</div>
    </div>
    
    <div id="login-form" style="display:none">
      <div class="small dim" id="url-display"></div>
      <button id="btn-admin" class="btn btn-primary btn-full mt-16">Enter as Admin</button>
      <button id="btn-guest" class="btn btn-full mt-8">Enter as Guest</button>
      <button id="btn-settings" class="btn btn-sm dim mt-16" style="border:none;background:none">⚙ Change settings</button>
    </div>
  </div>
</div>

<!-- Join screen -->
<div id="screen-join" class="screen">
  <div class="logo" style="font-size:20px">Join Game</div>
  <div class="panel">
    <label>Room Code</label>
    <input id="inp-room" type="text" placeholder="ABCDEF" maxlength="6" style="text-align:center;font-size:24px;letter-spacing:.2em;text-transform:uppercase">
    <button id="btn-join" class="btn btn-primary btn-full mt-16">Join Room</button>
    <button id="btn-join-back" class="btn btn-full mt-8">Back</button>
  </div>
</div>

<!-- Status bar (shown in game) -->
<div id="status-bar" class="status-bar" style="position:sticky;top:0;justify-content:space-between">
  <div onclick="showRoomCode()" style="cursor:pointer;z-index:1"><span class="conn-dot" id="conn-dot"></span><span class="small gold" id="room-display">Room: —</span></div>
  <div class="round-display" id="round-display">Round 1</div>
  <div style="z-index:1;visibility:hidden" class="small">Room: ABCDEF</div>
</div>

<!-- Score screen -->
<div id="screen-score" class="screen body-padded">
  <div id="score-content"></div>
</div>

<!-- Setup screen -->
<div id="screen-setup" class="screen body-padded">
  <div class="panel">
    <div class="panel-title">Game Settings</div>
    <label>Victory Point Goal</label>
    <select id="vp-goal">
      <option value="10">10 VP (Standard)</option>
      <option value="12">12 VP (Extended)</option>
      <option value="14">14 VP (Epic)</option>
    </select>
  </div>
  <div class="panel">
    <div class="panel-title">Players</div>
    <div id="setup-players"></div>

      <button id="btn-start" class="btn btn-primary">⚔ Start Game</button>
    </div>

  </div>
</div>

<!-- Tech screen -->
<div id="screen-tech" class="screen body-padded">
  <div class="panel">
    <div class="panel-title">Technologies</div>
    <div id="tech-content"></div>
  </div>
</div>

<!-- History screen -->
<div id="screen-history" class="screen body-padded">
  <div class="panel">
    <div class="panel-title">Game History</div>
    <div id="history-content"></div>
  </div>
</div>

<!-- Bottom nav -->
<div id="nav" class="nav">
  <button class="nav-btn" data-nav="setup"><span class="nav-icon">⚙</span>Setup</button>
  <button class="nav-btn" data-nav="score"><span class="nav-icon">🏆</span>Score</button>
  <button class="nav-btn" data-nav="tech"><span class="nav-icon">🔬</span>Tech</button>
  <button class="nav-btn" data-nav="history"><span class="nav-icon">📋</span>History</button>
</div>

<!-- Faction modal -->
<div id="modal-overlay" class="modal-overlay"></div>
<div id="modal" class="modal"></div>

<div id="log-toggle" onclick="toggleLog()">🐞</div>
<div id="log"></div>

<script>
// =============================================================================
// TI4 Tracker - Single file, no module systems, no IIFEs

var VERSION = '2.035';
document.getElementById('version-display').textContent = 'v' + VERSION;

// Debug logger - silent unless panel toggled open
var logBuffer = [];
function log(msg) {
  console.log('[ti4]', msg);
  var ts = new Date().toLocaleTimeString();
  logBuffer.unshift(ts + ' ' + msg);
  if (logBuffer.length > 50) logBuffer.pop();
  var el = document.getElementById('log');
  if (el && el.classList.contains('open')) {
    el.innerHTML = logBuffer.join('<br>');
  }
}
function toggleLog() {
  var el = document.getElementById('log');
  if (!el) return;
  el.classList.toggle('open');
  if (el.classList.contains('open')) el.innerHTML = logBuffer.join('<br>');
}
window.toggleLog = toggleLog;
window.onerror = function(msg, src, line, col, err) {
  log('ERR: ' + msg + ' @' + line);
};

// =============================================================================
// IndexedDB Storage
// =============================================================================
var db = null;
function openDB() {
  return new Promise(function(resolve, reject) {
    if (db) { resolve(db); return; }
    var req = indexedDB.open('ti4', 1);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'k' });
      if (!d.objectStoreNames.contains('history')) d.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = function(e) { db = e.target.result; resolve(db); };
    req.onerror = function() { reject(req.error); };
  });
}

function dbGet(store, key) {
  return openDB().then(function(d) {
    return new Promise(function(resolve) {
      var r = d.transaction(store).objectStore(store).get(key);
      r.onsuccess = function() { resolve(r.result); };
      r.onerror = function() { resolve(null); };
    });
  });
}

function dbSet(store, value) {
  return openDB().then(function(d) {
    return new Promise(function(resolve) {
      var r = d.transaction(store, 'readwrite').objectStore(store).put(value);
      r.onsuccess = function() { resolve(true); };
      r.onerror = function() { resolve(false); };
    });
  });
}

function dbGetAll(store) {
  return openDB().then(function(d) {
    return new Promise(function(resolve) {
      var r = d.transaction(store).objectStore(store).getAll();
      r.onsuccess = function() { resolve(r.result || []); };
      r.onerror = function() { resolve([]); };
    });
  });
}

function dbDelete(store, key) {
  return openDB().then(function(d) {
    return new Promise(function(resolve) {
      var r = d.transaction(store, 'readwrite').objectStore(store).delete(key);
      r.onsuccess = function() { resolve(true); };
      r.onerror = function() { resolve(false); };
    });
  });
}

// =============================================================================
// Supabase
// =============================================================================
function loadSupabase() {
  return new Promise(function(resolve, reject) {
    if (window.supabase && window.supabase.createClient) { resolve(); return; }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.onload = resolve;
    s.onerror = function() { reject(new Error('Supabase CDN failed')); };
    document.head.appendChild(s);
  });
}

function initSupabase(url, key) {
  return loadSupabase().then(function() {
    if (!window.supabase || !window.supabase.createClient) throw new Error('Supabase client not available');
    supabase = window.supabase.createClient(url, key);
    log('Supabase initialized');
    return supabase;
  });
}

function generateRoomCode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code = '';
  for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function pushState() {
  if (!supabase || !roomCode || !isAdmin) return Promise.resolve();
  return supabase.from('ti4_rooms').upsert({
    room_code: roomCode,
    state: state,
    updated_at: new Date().toISOString()
  }, { onConflict: 'room_code' }).then(function(r) {
    if (r.error) log('Push error: ' + r.error.message);
    else log('Pushed state OK');
    return r;
  });
}

function fetchState() {
  if (!supabase || !roomCode) return Promise.resolve(null);
  return supabase.from('ti4_rooms').select('state').eq('room_code', roomCode).maybeSingle().then(function(r) {
    if (r.error) { log('Fetch error: ' + r.error.message); return null; }
    return r.data ? r.data.state : null;
  });
}

function startPolling() {
  stopPolling();
  pollInterval = setInterval(function() {
    fetchState().then(function(s) {
      if (s && JSON.stringify(s) !== JSON.stringify(state)) {
        state = s;
        renderAll();
      }
    });
  }, 3000);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

// =============================================================================
// Navigation
// =============================================================================
function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function setNav(tab) {
  currentNav = tab;
  var btns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-nav') === tab);
  }
  showScreen('screen-' + tab);
  renderAll();
}

// =============================================================================
// Render
// =============================================================================
function renderAll() {
  document.getElementById('round-display').textContent = 'Round ' + state.round;
  if (roomCode) document.getElementById('room-display').textContent = 'Room: ' + roomCode;
  if (currentNav === 'score') renderScore();
  if (currentNav === 'setup') renderSetup();
  if (currentNav === 'tech') renderTech();
  if (currentNav === 'history') renderHistory();
}

function renderScore() {
  var el = document.getElementById('score-content');
  if (!state.started) {
    el.innerHTML = '<div class="panel center"><div class="gold" style="font-size:16px">No game in progress</div><div class="small dim mt-8">Go to Setup to start a game</div></div>';
    return;
  }

  var h = '';
  if (isAdmin && !state.ended) {
    h += '<div class="panel"><div class="row">';
    h += '<button class="btn btn-primary" onclick="nextRound()">Next Round ▶</button>';
    h += '<button class="btn btn-danger" onclick="endGame()">⏹ End Game</button>';
    h += '</div></div>';
  }

  if (state.ended) {
    h += '<div class="panel center" style="border-color:var(--gold)">';
    h += '<div class="gold" style="font-size:20px">🏆 Game Over</div>';
    if (state.winner) h += '<div class="mt-8">Winner: <b>' + state.winner + '</b></div>';
    h += '<div class="small dim mt-8">' + state.round + ' rounds played</div>';
    if (isAdmin) h += '<button class="btn btn-primary mt-16" onclick="newGame()">New Game</button>';
    h += '</div>';
  }

  // Horizontal score strip - sorted by VP, names in player order preserved
  var n = state.players.length;
  // Calculate font size that fits all players in a row
  // For 8 players: smaller; for 2: larger. +50% from previous.
  var scoreFontSize = Math.max(42, Math.min(96, Math.floor((80 - n * 5) * 1.5)));
  var nameFontSize = 12;
  
  h += '<div class="panel"><div style="display:flex;gap:4px;justify-content:space-around;align-items:flex-end">';
  state.players.forEach(function(p, i) {
    h += '<div style="flex:1;text-align:center;min-width:0">';
    h += '<div style="font-size:' + scoreFontSize + 'px;font-weight:700;color:' + p.color + ';line-height:1;text-shadow:-1px -1px 0 rgba(255,255,255,.6), 1px -1px 0 rgba(255,255,255,.6), -1px 1px 0 rgba(255,255,255,.6), 1px 1px 0 rgba(255,255,255,.6), 0 0 3px rgba(255,255,255,0.3)">' + p.vp + '</div>';
    h += '<div style="font-size:' + nameFontSize + 'px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px">' + p.name + '</div>';
    h += '</div>';
  });
  h += '</div><div class="small dim center mt-8">Goal: ' + state.vpGoal + ' VP · Round ' + state.round + '</div></div>';
  
  // Objectives board
  if (state.objectives && (state.objectives.stage1.length || state.objectives.stage2.length)) {
    h += '<div class="panel">';
    h += '<div class="panel-title">Public Objectives</div>';
    h += renderObjectiveRow(state.objectives.stage1, 1);
    h += renderObjectiveRow(state.objectives.stage2, 2);
    h += '</div>';
  }
  
  // Secret objectives panel
  h += '<div class="panel">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h += '<div style="font-size:11px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase">Secret Objectives</div>';
  if (isAdmin) {
    h += '<button class="btn btn-sm btn-primary" onclick="openSecretPicker()">+ Score Secret</button>';
  }
  h += '</div>';
  
  if (!state.secretsScored || !state.secretsScored.length) {
    h += '<div class="small dim center" style="padding:8px">No secret objectives scored yet</div>';
  } else {
    h += '<div style="display:flex;flex-direction:column;gap:4px">';
    state.secretsScored.forEach(function(s, idx) {
      var p = state.players[s.playerIdx];
      if (!p) return;
      var typeColor = s.type === 'Status' ? '#3a8bce' : s.type === 'Action' ? '#d97706' : '#a569bd';
      h += '<div style="display:flex;align-items:center;gap:8px;background:rgba(36, 50, 84, 0.4);border:1px solid var(--border);border-radius:6px;padding:6px 10px">';
      h += '<div style="width:12px;height:12px;background:' + p.color + ';border:1px solid rgba(255,255,255,.25);border-radius:50%;flex-shrink:0"></div>';
      h += '<div style="flex:1;min-width:0">';
      h += '<div style="font-size:12px;font-weight:600;color:' + p.color + ';text-shadow:-0.5px -0.5px 0 rgba(255,255,255,.3), 0.5px -0.5px 0 rgba(255,255,255,.3), -0.5px 0.5px 0 rgba(255,255,255,.3), 0.5px 0.5px 0 rgba(255,255,255,.3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + s.name + '</div>';
      h += '<div style="font-size:9px;color:' + typeColor + ';letter-spacing:.08em">' + p.name + ' · ' + s.type + '</div>';
      h += '</div>';
      if (isAdmin) {
        h += '<button onclick="removeSecret(' + idx + ')" style="background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0 4px">✕</button>';
      }
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';
  
  // Other Objectives panel
  h += '<div class="panel">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h += '<div style="font-size:11px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase">Other Objectives</div>';
  if (isAdmin) {
    h += '<button class="btn btn-sm btn-primary" onclick="openOtherPicker()">+ Score Other</button>';
  }
  h += '</div>';
  
  if (!state.otherScored || !state.otherScored.length) {
    h += '<div class="small dim center" style="padding:8px">No other objectives scored yet</div>';
  } else {
    h += '<div style="display:flex;flex-direction:column;gap:4px">';
    state.otherScored.forEach(function(s, idx) {
      var p = state.players[s.playerIdx];
      if (!p) return;
      h += '<div style="display:flex;align-items:center;gap:8px;background:rgba(36, 50, 84, 0.4);border:1px solid var(--border);border-radius:6px;padding:6px 10px">';
      h += '<div style="width:12px;height:12px;background:' + p.color + ';border:1px solid rgba(255,255,255,.25);border-radius:50%;flex-shrink:0"></div>';
      h += '<div style="flex:1;min-width:0">';
      h += '<div style="font-size:12px;font-weight:600;color:' + p.color + ';text-shadow:-0.5px -0.5px 0 rgba(255,255,255,.3), 0.5px -0.5px 0 rgba(255,255,255,.3), -0.5px 0.5px 0 rgba(255,255,255,.3), 0.5px 0.5px 0 rgba(255,255,255,.3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + s.name + '</div>';
      h += '<div style="font-size:9px;color:var(--text-dim);letter-spacing:.08em">' + p.name + ' · +' + (s.vp || 1) + ' VP</div>';
      h += '</div>';
      if (isAdmin) {
        h += '<button onclick="removeOther(' + idx + ')" style="background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0 4px">✕</button>';
      }
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';
  
  el.innerHTML = h;
}

function renderObjectiveRow(objs, stage) {
  var h = '<div style="display:flex;gap:6px;margin-bottom:8px;justify-content:space-around">';
  objs.forEach(function(o, idx) {
    if (o.revealed) {
      var accent = stage === 1 ? '#d97706' : '#3a8bce';
      var vpText = stage === 1 ? 'VICTORY POINT' : 'VICTORY POINTS';
      var stageKey = 'stage' + stage;
      // Score circles stacked on right edge of card
      var circles = '';
      (o.scoredBy || []).forEach(function(playerIdx) {
        var p = state.players[playerIdx];
        if (p) circles += '<div style="width:16px;height:16px;background:' + p.color + ';border:1px solid rgba(255,255,255,.3);margin:1px 0;border-radius:50%"></div>';
      });
      h += '<div onclick="openObjective(\'' + stageKey + '\',' + idx + ')" style="flex:1;min-width:0;max-width:120px;aspect-ratio:2/3;background:#0a1525;border:2px solid ' + accent + ';border-radius:6px;padding:6px;font-size:9px;line-height:1.2;text-align:center;display:flex;flex-direction:column;box-shadow:0 0 8px rgba(' + (stage===1?'217,119,6':'58,139,206') + ',.3) inset;cursor:pointer;position:relative">';
      // Title
      h += '<div style="font-weight:700;color:' + accent + ';font-size:9px;letter-spacing:.05em;padding:2px 0;line-height:1.1;min-height:22px;display:flex;align-items:center;justify-content:center">' + o.name + '</div>';
      // Description (centered, takes most of card)
      h += '<div style="color:#dde4f0;font-size:8px;flex:1;display:flex;align-items:center;justify-content:center;padding:4px">' + o.desc + '</div>';
      // VP circle at bottom
      h += '<div style="background:' + accent + ';color:#0a1525;font-weight:700;font-size:14px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2px">' + stage + '</div>';
      h += '<div style="color:' + accent + ';font-size:7px;letter-spacing:.1em;font-weight:700">' + vpText + '</div>';
      // Color circles stacked on right edge
      if (circles) {
        h += '<div style="position:absolute;right:-8px;top:4px;display:flex;flex-direction:column">' + circles + '</div>';
      }
      h += '</div>';
    } else {
      // Face-down card: show card back image
      var img = stage === 1 ? 'card-back-stage1.png' : 'card-back-stage2.png';
      h += '<div style="flex:1;min-width:0;max-width:120px;aspect-ratio:2/3;background:url(images/' + img + ') center/contain no-repeat"></div>';
    }
  });
  h += '</div>';
  return h;
}

function renderTech() {
  var el = document.getElementById('tech-content');
  if (!state.started || !state.players.length) {
    el.innerHTML = '<div class="small dim">Start a game to research technologies</div>';
    return;
  }
  
  var p = state.players[techPlayer];
  if (!p) { techPlayer = 0; p = state.players[0]; }
  
  var h = '<div class="row" style="flex-wrap:wrap;gap:4px">';
  state.players.forEach(function(pl, i) {
    h += '<button class="btn btn-sm" onclick="setTechPlayer(' + i + ')" style="border-color:' + pl.color + (i === techPlayer ? ';background:rgba(201,168,76,.15);color:var(--gold)' : '') + '">' + pl.name + '</button>';
  });
  h += '</div>';
  
  h += '<div class="small mt-16"><b>' + p.name + '</b> — ' + p.faction + '</div>';
  
  // Filter tabs
  var filters = [['all','All'],['biotic','Biotic'],['propulsion','Propulsion'],['cybernetic','Cybernetic'],['warfare','Warfare'],['unit','Units'],['faction','Faction']];
  h += '<div class="row mt-8" style="flex-wrap:wrap;gap:4px">';
  filters.forEach(function(f) {
    h += '<button class="btn btn-sm" onclick="setTechFilter(\'' + f[0] + '\')" style="' + (techFilter === f[0] ? 'border-color:var(--gold);color:var(--gold)' : '') + '">' + f[1] + '</button>';
  });
  h += '</div>';
  
  // Current techs
  h += '<div class="mt-16"><div class="small dim">Researched:</div>';
  if (!p.techs || !p.techs.length) {
    h += '<div class="small dim mt-8">None yet</div>';
  } else {
    h += '<div class="mt-8">' + p.techs.map(function(name) {
      var t = TECHNOLOGIES.find(function(x) { return x.name === name; });
      var type = t ? t.type : 'unit';
      return '<span class="tech-chip ' + type + '">' + name + (isAdmin ? ' <span onclick="removeTech(\'' + name.replace(/'/g, "\\'") + '\')" style="cursor:pointer;opacity:.6">✕</span>' : '') + '</span>';
    }).join('') + '</div>';
  }
  h += '</div>';
  
  // Available techs grouped by type
  h += '<div class="mt-16"><div class="small dim">Available:</div>';
  
  var fd = FACTION_DATA[p.faction] || {};
  var myFT = {};
  (fd.factionTechs || []).forEach(function(ft) { myFT[ft.name] = true; });
  
  var available = TECHNOLOGIES.filter(function(t) {
    if (techFilter !== 'all' && t.type !== techFilter) return false;
    if (p.techs && p.techs.indexOf(t.name) >= 0) return false;
    return true;
  });
  
  var typeLabels = {biotic:'Biotic',propulsion:'Propulsion',cybernetic:'Cybernetic',warfare:'Warfare',unit:'Unit Upgrades',faction:'Faction'};
  var groups = {};
  var order = [];
  available.forEach(function(t) {
    if (!groups[t.type]) { groups[t.type] = []; order.push(t.type); }
    groups[t.type].push(t);
  });
  
  // Sort faction techs: mine first
  if (groups.faction) {
    groups.faction.sort(function(a, b) {
      var aMine = myFT[a.name] ? 0 : 1;
      var bMine = myFT[b.name] ? 0 : 1;
      return aMine - bMine;
    });
  }
  
  order.forEach(function(type) {
    h += '<div class="tech-section">';
    h += '<div class="tech-section-label" style="color:var(--' + (type === 'biotic' ? 'green' : type === 'propulsion' ? 'blue' : 'gold') + ')">' + (typeLabels[type] || type) + '</div>';
    h += groups[type].map(function(t) {
      var greyed = type === 'faction' && !myFT[t.name];
      var click = isAdmin && !greyed ? 'onclick="addTech(\'' + t.name.replace(/'/g, "\\'") + '\')"' : '';
      var style = greyed ? 'opacity:.3' : '';
      return '<span class="tech-item ' + type + '" ' + click + ' style="' + style + '">' + t.name + '</span>';
    }).join('');
    h += '</div>';
  });
  h += '</div>';
  
  el.innerHTML = h;
}

function renderHistory() {
  dbGetAll('history').then(function(entries) {
    var el = document.getElementById('history-content');
    if (!entries.length) {
      el.innerHTML = '<div class="small dim center" style="padding:20px">No completed games yet</div>';
      return;
    }
    el.innerHTML = entries.reverse().map(function(e) {
      var date = new Date(e.playedAt).toLocaleDateString();
      var players = (e.players || []).map(function(p) { return p.name; }).join(', ');
      return '<div class="panel" style="position:relative">' +
        '<div class="small dim">' + date + ' · ' + (e.rounds || 1) + ' rounds · ' + (e.vpGoal || 10) + ' VP</div>' +
        (e.winner ? '<div class="gold">🏆 ' + e.winner + '</div>' : '') +
        '<div class="small dim">' + players + '</div>' +
        '<button class="btn btn-sm" onclick="deleteHistory(' + e.id + ')" style="position:absolute;top:8px;right:8px;color:var(--red)">🗑</button>' +
        '</div>';
    }).join('');
  });
}

  if (d.abilities && d.abilities.length) {

    });

    h += '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:6px">';

function scorePlayer(playerIdx) {
  if (!isAdmin || !currentObjective) return;
  var o = state.objectives[currentObjective.stageKey][currentObjective.idx];
  if (!o) return;
  if (!o.scoredBy) o.scoredBy = [];
  if (o.scoredBy.indexOf(playerIdx) >= 0) return;
  o.scoredBy.push(playerIdx);
  // Add VP to player
  var vpVal = currentObjective.stageKey === 'stage1' ? 1 : 2;
  state.players[playerIdx].vp = (state.players[playerIdx].vp || 0) + vpVal;
  pushState();
  // Refresh modal and underlying board
  openObjective(currentObjective.stageKey, currentObjective.idx);
  renderScore();
  // Check win
  if (state.players[playerIdx].vp >= state.vpGoal) {
    setTimeout(function() {
      if (confirm(state.players[playerIdx].name + ' has reached ' + state.vpGoal + ' VP! End the game?')) {
        closeModal();
        endGame(state.players[playerIdx].name);
      }
    }, 100);
  }
}

function unscorePlayer(playerIdx) {
  if (!isAdmin || !currentObjective) return;
  var o = state.objectives[currentObjective.stageKey][currentObjective.idx];
  if (!o || !o.scoredBy) return;
  var pos = o.scoredBy.indexOf(playerIdx);
  if (pos < 0) return;
  o.scoredBy.splice(pos, 1);
  // Remove VP from player
  var vpVal = currentObjective.stageKey === 'stage1' ? 1 : 2;
  state.players[playerIdx].vp = Math.max(0, (state.players[playerIdx].vp || 0) - vpVal);
  pushState();
  openObjective(currentObjective.stageKey, currentObjective.idx);
  renderScore();
}

function recycleObjective() {
  if (!isAdmin || !currentObjective) return;
  if (!confirm('Replace this objective with a random new one?\n\nThe current card will be removed and replaced. Any player who scored it will lose those VP.')) return;
  
  var o = state.objectives[currentObjective.stageKey][currentObjective.idx];
  if (!o) return;
  
  // Refund VP to anyone who scored this
  var vpVal = currentObjective.stageKey === 'stage1' ? 1 : 2;
  (o.scoredBy || []).forEach(function(pi) {
    if (state.players[pi]) {
      state.players[pi].vp = Math.max(0, (state.players[pi].vp || 0) - vpVal);
    }
  });
  
  // Mark the old name as used so it can't come back this game
  if (state.objectives.used.indexOf(o.name) < 0) state.objectives.used.push(o.name);
  
  // Find a new random objective from the same pool, not already used
  var pool = currentObjective.stageKey === 'stage1' ? STAGE1_OBJECTIVES : STAGE2_OBJECTIVES;
  var available = pool.filter(function(p) { return state.objectives.used.indexOf(p.name) < 0; });
  if (!available.length) {
    alert('No more objectives available in that pool.');
    return;
  }
  var picked = available[Math.floor(Math.random() * available.length)];
  state.objectives.used.push(picked.name);
  
  // Replace in same position, keeping revealed state
  state.objectives[currentObjective.stageKey][currentObjective.idx] = {
    name: picked.name,
    desc: picked.desc,
    revealed: true,  // recycled cards stay visible
    scoredBy: []
  };
  
  pushState();
  openObjective(currentObjective.stageKey, currentObjective.idx);
  renderScore();
}

function confirmOtherScore(name, vp, playerIdx) {
  if (!isAdmin) return;
  if (!state.otherScored) state.otherScored = [];
  
  // Look up rules for this objective
  var rule = OTHER_OBJECTIVES.find(function(o) { return o.name === name; }) || {};
  
  // If it's a "once" item that already exists, block
  if (rule.once) {
    var alreadyOnce = state.otherScored.find(function(s) { return s.name === name; });
    if (alreadyOnce) {
      alert(name + ' can only be scored once.');
      return;
    }
  }
  
  // If exclusive, remove from previous holder first (refund VP)
  if (rule.exclusive) {
    for (var i = state.otherScored.length - 1; i >= 0; i--) {
      if (state.otherScored[i].name === name) {
        var prev = state.otherScored[i];
        // If same player tries to re-score what they already hold, just no-op
        if (prev.playerIdx === playerIdx) {
          alert(state.players[playerIdx].name + ' already holds ' + name + '.');
          return;
        }
        // Refund VP to old holder
        if (state.players[prev.playerIdx]) {
          state.players[prev.playerIdx].vp = Math.max(0, (state.players[prev.playerIdx].vp || 0) - prev.vp);
        }
        state.otherScored.splice(i, 1);
      }
    }
  }
  
  state.otherScored.push({ name: name, vp: vp, playerIdx: playerIdx });
  state.players[playerIdx].vp = Math.max(0, (state.players[playerIdx].vp || 0) + vp);
  closeModal();
  pushState();
  renderScore();
  if (state.players[playerIdx].vp >= state.vpGoal) {
    setTimeout(function() {
      if (confirm(state.players[playerIdx].name + ' has reached ' + state.vpGoal + ' VP! End the game?')) {
        endGame(state.players[playerIdx].name);
      }
    }, 100);
  }
}

function removeOther(idx) {
  if (!isAdmin) return;
  if (!state.otherScored || !state.otherScored[idx]) return;
  if (!confirm('Remove this scoring?')) return;
  var entry = state.otherScored[idx];
  if (state.players[entry.playerIdx]) {
    state.players[entry.playerIdx].vp = Math.max(0, (state.players[entry.playerIdx].vp || 0) - entry.vp);
  }
  state.otherScored.splice(idx, 1);
  pushState();
  renderScore();
}

function openSecretPicker() {
  if (!isAdmin) return;
  // Get list of secrets not yet scored
  var usedNames = (state.secretsScored || []).map(function(s) { return s.name; });
  var available = SECRET_OBJECTIVES.filter(function(s) { return usedNames.indexOf(s.name) < 0; });
  
  if (!available.length) {
    alert('All secret objectives have already been scored.');
    return;
  }
  
  // Group by type: Agenda, Status, Action (in that order). Alphabetize within group.
  var typeOrder = ['Agenda', 'Status', 'Action'];
  var grouped = {};
  typeOrder.forEach(function(t) { grouped[t] = []; });
  available.forEach(function(s) {
    if (!grouped[s.type]) grouped[s.type] = [];
    grouped[s.type].push(s);
  });
  // Sort each group alphabetically
  Object.keys(grouped).forEach(function(t) {
    grouped[t].sort(function(a, b) { return a.name.localeCompare(b.name); });
  });
  
  var h = '<div style="text-align:center;margin-bottom:12px"><div class="gold" style="font-size:16px">Choose Secret Objective</div></div>';
  typeOrder.forEach(function(t) {
    if (!grouped[t] || !grouped[t].length) return;
    var typeColor = t === 'Status' ? '#3a8bce' : t === 'Action' ? '#d97706' : '#a569bd';
    h += '<div style="margin-bottom:10px">';
    h += '<div style="font-size:10px;letter-spacing:.15em;color:' + typeColor + ';text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:4px">' + t + '</div>';
    grouped[t].forEach(function(s) {
      var safeName = s.name.replace(/'/g, "\\'");
      h += '<div onclick="chooseSecretPlayer(\'' + safeName + '\',\'' + s.type + '\')" style="padding:8px 10px;border:1px solid var(--border2);border-radius:6px;margin-bottom:3px;cursor:pointer;background:rgba(36, 50, 84, 0.3);font-size:13px">' + s.name + '</div>';
    });
    h += '</div>';
  });
  h += '<button class="btn btn-full mt-8" onclick="closeModal()">Cancel</button>';
  
  var modal = document.getElementById('modal');
  modal.classList.add('modal-center');
  modal.innerHTML = h;
  modal.classList.add('open');
  document.getElementById('modal-overlay').classList.add('open');
}

    var opacity = atMax ? '0.4' : '1';
    h += '<button class="btn" ' + disabled + ' onclick="confirmSecretScore(\'' + safeName + '\',\'' + secretType + '\',' + i + ')" style="opacity:' + opacity + ';border-color:' + p.color + ';color:' + p.color + ';text-align:left;text-shadow:-1px -1px 0 rgba(255,255,255,.6), 1px -1px 0 rgba(255,255,255,.6), -1px 1px 0 rgba(255,255,255,.6), 1px 1px 0 rgba(255,255,255,.6);font-weight:600">';
    h += '<span style="display:inline-block;width:14px;height:14px;background:' + p.color + ';border:1px solid rgba(255,255,255,.35);border-radius:50%;vertical-align:middle;margin-right:8px"></span>';
    h += p.name + ' <span class="small dim" style="text-shadow:none;font-weight:400">(' + scoredCount + '/3)</span>';
    if (atMax) h += ' <span class="small dim" style="text-shadow:none;font-weight:400">— at limit</span>';
    h += '</button>';
  });
  h += '</div>';
  h += '<button class="btn btn-full mt-16" onclick="openSecretPicker()">Back</button>';
  
  document.getElementById('modal').innerHTML = h;
}

function confirmSecretScore(secretName, secretType, playerIdx) {
  if (!isAdmin) return;
  // Block double-score (same secret)
  var already = (state.secretsScored || []).find(function(s) { return s.name === secretName; });
  if (already) {
    alert('This secret has already been scored.');
    return;
  }
  // Block if player at 3-secret limit
  var playerCount = (state.secretsScored || []).filter(function(s) { return s.playerIdx === playerIdx; }).length;
  if (playerCount >= 3) {
    alert(state.players[playerIdx].name + ' has already scored 3 secret objectives (maximum).');
    return;
  }
  if (!state.secretsScored) state.secretsScored = [];
  state.secretsScored.push({ name: secretName, type: secretType, playerIdx: playerIdx });
  // Add 1 VP
  state.players[playerIdx].vp = (state.players[playerIdx].vp || 0) + 1;
  closeModal();
  pushState();
  renderScore();
  if (state.players[playerIdx].vp >= state.vpGoal) {
    setTimeout(function() {
      if (confirm(state.players[playerIdx].name + ' has reached ' + state.vpGoal + ' VP! End the game?')) {
        endGame(state.players[playerIdx].name);
      }
    }, 100);
  }
}

function removeSecret(idx) {
  if (!isAdmin) return;
  if (!state.secretsScored || !state.secretsScored[idx]) return;
  if (!confirm('Remove this secret objective scoring?')) return;
  var entry = state.secretsScored[idx];
  // Refund VP
  if (state.players[entry.playerIdx]) {
    state.players[entry.playerIdx].vp = Math.max(0, (state.players[entry.playerIdx].vp || 0) - 1);
  }
  state.secretsScored.splice(idx, 1);
  pushState();
  renderScore();
}

window.openSecretPicker = openSecretPicker;
window.chooseSecretPlayer = chooseSecretPlayer;
window.confirmSecretScore = confirmSecretScore;
window.removeSecret = removeSecret;


window.openObjective = openObjective;
window.openScoreList = openScoreList;
window.scorePlayer = scorePlayer;
window.unscorePlayer = unscorePlayer;
window.recycleObjective = recycleObjective;

function openColorPicker(playerIdx) {
  if (state.started) return;
  var p = state.players[playerIdx];
  if (!p) return;
  var h = '<div style="text-align:center;margin-bottom:16px"><div class="gold" style="font-size:18px">Choose Color</div><div class="small dim mt-8">' + p.name + '</div></div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;padding:8px 0">';
  TI4_COLORS.forEach(function(c) {
    var owner = state.players.findIndex(function(pp) { return pp.color === c.hex; });
    var isOwn = owner === playerIdx;
    var size = isOwn ? 56 : 48;
    var border = isOwn ? '3px solid var(--gold)' : '2px solid var(--border2)';
    var label = c.name + (owner >= 0 && !isOwn ? ' (swap with ' + state.players[owner].name + ')' : '');
    h += '<div onclick="pickColor(' + playerIdx + ',\'' + c.hex + '\')" style="cursor:pointer;text-align:center">';
    h += '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + c.hex + ';border:' + border + ';margin:0 auto"></div>';
    h += '<div style="font-size:10px;color:var(--text-dim);margin-top:4px">' + c.name + '</div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<button class="btn btn-full mt-16" onclick="closeModal()">Cancel</button>';
  document.getElementById('modal').innerHTML = h;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-overlay').classList.add('open');
}

function pickColor(playerIdx, hex) {
  if (state.started) return;
  var current = state.players[playerIdx];
  if (!current) return;
  // Find if any other player owns this color
  var ownerIdx = state.players.findIndex(function(p, i) { return i !== playerIdx && p.color === hex; });
  if (ownerIdx >= 0) {
    // Swap colors
    state.players[ownerIdx].color = current.color || null;
  }
  current.color = hex;
  renderSetup();
  closeModal();
  if (isAdmin) pushState();
}

// =============================================================================
// Game actions
// =============================================================================
function addPlayer() {
  if (!isAdmin || state.started || state.players.length >= 8) return;
  state.players.push({
    name: 'Player ' + (state.players.length + 1),
    faction: FACTIONS[state.players.length % FACTIONS.length],
    color: null,
    vp: 0,
    techs: []
  });
  renderSetup();
  if (isAdmin) pushState();
}

function removePlayer(i) {
  if (!isAdmin || state.started) return;
  state.players.splice(i, 1);
  // Renumber default "Player N" names
  state.players.forEach(function(p, idx) {
    if (/^Player \d+$/.test(p.name)) {
      p.name = 'Player ' + (idx + 1);
    }
  });
  renderSetup();
  if (isAdmin) pushState();
}

function updatePlayer(i, field, value) {
  if (!isAdmin) return;
  // After game ends, nothing is editable
  if (state.ended) return;
  // After game starts, only name is editable (not color/faction)
  if (state.started && field !== 'name') return;
  state.players[i][field] = value;
  renderSetup();
  if (isAdmin) pushState();
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startGame() {
  if (!isAdmin || state.players.length < 2) return alert('At least 2 players required');
  // Find any player without a color
  var noColor = state.players.find(function(p) { return !p.color; });
  if (noColor) return alert(noColor.name + " hasn't chosen a faction color");
  state.started = true;
  state.startTime = new Date().toISOString();
  // Assign starting techs
  state.players.forEach(function(p) {
    p.techs = (STARTING_TECH[p.faction] || []).filter(function(t) {
      return TECHNOLOGIES.find(function(x) { return x.name === t; });
    });
    p.vp = 0;
  });
  // Pick 5 random stage 1 and 5 random stage 2 objectives, all face-down
  state.objectives = {
    stage1: shuffle(STAGE1_OBJECTIVES).slice(0, 5).map(function(o, i) { return { name: o.name, desc: o.desc, revealed: i < 2, scoredBy: [] }; }),
    stage2: shuffle(STAGE2_OBJECTIVES).slice(0, 5).map(function(o) { return { name: o.name, desc: o.desc, revealed: false, scoredBy: [] }; }),
    used: [] // tracks names already drawn/discarded so recycle doesn't repick
  };
  // Mark all initially-drawn objectives as used
  state.objectives.stage1.forEach(function(o) { state.objectives.used.push(o.name); });
  state.objectives.stage2.forEach(function(o) { state.objectives.used.push(o.name); });
  state.secretsScored = [];
  state.otherScored = [];
  setNav('score');
  pushState();
}

function vp(i, delta) {
  if (!isAdmin || state.ended) return;
  state.players[i].vp = Math.max(0, state.players[i].vp + delta);
  renderScore();
  if (isAdmin) pushState();
  if (state.players[i].vp >= state.vpGoal) endGame(state.players[i].name);
}

function nextRound() {
  if (!isAdmin || state.ended) return;
  state.round++;
  // Reveal the next objective card
  if (state.objectives) {
    var nextS1 = state.objectives.stage1.find(function(o) { return !o.revealed; });
    if (nextS1) {
      nextS1.revealed = true;
    } else {
      var nextS2 = state.objectives.stage2.find(function(o) { return !o.revealed; });
      if (nextS2) nextS2.revealed = true;
    }
  }
  renderAll();
  pushState();
}

function endGame(winnerName) {
  if (!isAdmin) return;
  if (!winnerName && !confirm('End game and save results?')) return;
  if (!winnerName) {
    var sorted = state.players.slice().sort(function(a,b) { return b.vp - a.vp; });
    winnerName = sorted[0] ? sorted[0].name : null;
  }
  state.ended = true;
  state.winner = winnerName;
  state.endTime = new Date().toISOString();
  // Save to history (only if game lasted more than 2 rounds)
  if (state.round > 2) {
    dbSet('history', {
      playedAt: new Date().toISOString(),
      players: state.players.map(function(p) { return {name: p.name, faction: p.faction, vp: p.vp, color: p.color}; }),
      winner: winnerName,
      rounds: state.round,
      vpGoal: state.vpGoal
    });
  }
  renderAll();
  if (isAdmin) pushState();
}

function tempAutoColor() {
  if (!isAdmin || state.started) return;
  // Get all available colors, shuffle them, assign to players without color
  var used = state.players.map(function(p) { return p.color; }).filter(Boolean);
  var available = TI4_COLORS.filter(function(c) { return used.indexOf(c.hex) < 0; });
  // Shuffle
  for (var i = available.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = available[i]; available[i] = available[j]; available[j] = tmp;
  }
  // Assign to any player without a color
  var idx = 0;
  state.players.forEach(function(p) {
    if (!p.color && idx < available.length) {
      p.color = available[idx].hex;
      idx++;
    }
  });
  renderSetup();
  if (isAdmin) pushState();
}
window.tempAutoColor = tempAutoColor;

function newGame() {
  if (!confirm('Start new game? Current game is saved in history.')) return;
  state = { players: [], round: 1, vpGoal: 10, started: false, ended: false, winner: null, secretsScored: [], otherScored: [] };
  setNav('setup');
  if (isAdmin) pushState();
}

function setTechPlayer(i) {
  techPlayer = i;
  renderTech();
}

function setTechFilter(f) {
  techFilter = f;
  renderTech();
}

function addTech(name) {
  if (!isAdmin) return;
  var p = state.players[techPlayer];
  if (!p.techs) p.techs = [];
  if (p.techs.indexOf(name) < 0) p.techs.push(name);
  renderTech();
  if (isAdmin) pushState();
}

function removeTech(name) {
  if (!isAdmin) return;
  var p = state.players[techPlayer];
  p.techs = (p.techs || []).filter(function(n) { return n !== name; });
  renderTech();
  if (isAdmin) pushState();
}

function deleteHistory(id) {
  if (!confirm('Delete this game?')) return;
  dbDelete('history', id).then(renderHistory);
}

// =============================================================================
// Login flow
// =============================================================================
function enterGame(code) {
  document.getElementById('status-bar').classList.add('visible');
  document.getElementById('nav').classList.add('visible');
  document.getElementById('conn-dot').classList.add('on');
  // Admin goes to setup if no game started, guests always go to score
  setNav(isAdmin && !state.started ? 'setup' : 'score');
}

function enterAsAdmin() {
  log('Entering as admin');
  isAdmin = true;
  roomCode = generateRoomCode();
  state = { players: [], round: 1, vpGoal: 10, started: false, ended: false, winner: null };
  enterGame();
  pushState();
}

function enterAsGuest() {
  log('Show join screen');
  showScreen('screen-join');
}

function joinGame() {
  var code = document.getElementById('inp-room').value.trim().toUpperCase();
  if (code.length < 4) return alert('Enter a valid room code');
  log('Joining room ' + code);
  isAdmin = false;
  roomCode = code;
  fetchState().then(function(s) {
    if (s) {
      state = s;
      log('Loaded state from DB');
    } else {
      log('No state in DB yet, waiting for admin');
    }
    enterGame();
    startPolling();
  });
}

function saveSettings() {
  var url = document.getElementById('inp-url').value.trim().replace(/\/rest\/v1\/?$/, '').replace(/\/$/, '');
  var key = document.getElementById('inp-key').value.trim();
  if (!url || !key) return alert('Please enter both URL and key');
  if (!url.startsWith('https://')) return alert('URL must start with https://');
  
  var btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  
  initSupabase(url, key).then(function() {
    dbSet('settings', { k: 'url', v: url });
    dbSet('settings', { k: 'key', v: key });
    log('Settings saved');
    document.getElementById('url-display').textContent = url;
    document.getElementById('setup-form').style.display = 'none';
    document.getElementById('login-form').style.display = '';
    btn.disabled = false;
    btn.textContent = 'Save & Connect';
  }).catch(function(e) {
    alert('Failed to connect: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Save & Connect';
  });
}

function clearCache() {
  log('Clearing cache...');
  var go = function() { location.href = location.pathname + '?v=' + Date.now(); };
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      Promise.all(regs.map(function(r) { return r.unregister(); })).then(function() {
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            Promise.all(keys.map(function(k) { return caches.delete(k); })).then(go);
          });
        } else go();
      });
    });
  } else go();
}

// =============================================================================
// Wire up buttons
// =============================================================================
document.getElementById('btn-save').addEventListener('click', saveSettings);
document.getElementById('btn-reset').addEventListener('click', clearCache);
document.getElementById('btn-admin').addEventListener('click', enterAsAdmin);
document.getElementById('btn-guest').addEventListener('click', enterAsGuest);
document.getElementById('btn-join').addEventListener('click', joinGame);
document.getElementById('btn-join-back').addEventListener('click', function() { showScreen('screen-welcome'); });
document.getElementById('btn-settings').addEventListener('click', function() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('setup-form').style.display = '';
});
document.getElementById('btn-add-player').addEventListener('click', addPlayer);
document.getElementById('btn-auto-color').addEventListener('click', tempAutoColor);
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('vp-goal').addEventListener('change', function() {
  state.vpGoal = parseInt(this.value, 10);
  if (isAdmin) pushState();
});

var navBtns = document.querySelectorAll('.nav-btn');
for (var i = 0; i < navBtns.length; i++) {
  navBtns[i].addEventListener('click', function() { setNav(this.getAttribute('data-nav')); });
}

document.getElementById('modal-overlay').addEventListener('click', closeModal);

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}

// =============================================================================
// Init
// =============================================================================
function init() {
  log('Init starting');
  Promise.all([dbGet('settings', 'url'), dbGet('settings', 'key')]).then(function(results) {
    var url = results[0] && results[0].v;
    var key = results[1] && results[1].v;
    if (url && key) {
      log('Have saved credentials');
      document.getElementById('url-display').textContent = url;
      document.getElementById('inp-url').value = url;
      document.getElementById('inp-key').value = key;
      document.getElementById('setup-form').style.display = 'none';
      document.getElementById('login-form').style.display = '';
      initSupabase(url, key).catch(function(e) { log('Init Supabase failed: ' + e.message); });
    } else {
      log('No saved credentials');
    }
  }).catch(function(e) {
    log('Init error: ' + e.message);
  });
}

init();
log('App loaded v' + VERSION);

</script>
